  <ellipse cx="265" cy="193" rx="9" ry="3.5" transform="rotate(54 265 193)" fill="rgba(255,220,100,0.3)"/>
  <ellipse cx="283" cy="200" rx="18" ry="7.5" transform="rotate(74 283 200)" fill="url(#leafGrad2)"/>

