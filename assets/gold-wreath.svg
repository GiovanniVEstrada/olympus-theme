  <!-- ═══ BOTTOM TIE / BOW ═══ -->
  <path d="M188 270 C192 278 196 283 200 286 C204 283 208 278 212 270" 
        fill="none" stroke="#c9a03a" stroke-width="3" stroke-linecap="round"/>
  <path d="M188 270 C182 265 174 264 168 268" 
        fill="none" stroke="#c9a03a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M212 270 C218 265 226 264 232 268" 
        fill="none" stroke="#c9a03a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bow leaves -->
  <ellipse cx="178" cy="270" rx="14" ry="5.5" transform="rotate(-20 178 270)" fill="url(#leafGrad)"/>
  <ellipse cx="222" cy="270" rx="14" ry="5.5" transform="rotate(20 222 270)" fill="url(#leafGrad)"/>
  <circle cx="200" cy="272" r="5" fill="#d4a840"/>
  <circle cx="200" cy="272" r="2.5" fill="#f0d060"/>
